app-id: io.github.calstfrancis.Skrizhal
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: skrizhal

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_TARGET_DIR: /app/skrizhal-cargo-target
    RUST_BACKTRACE: '1'

modules:
  # Module 1: compile all cargo dependencies.
  # Cache key is based only on Cargo.toml, Cargo.lock, and cargo-sources.json.
  # This module is skipped (cache hit) on dev builds that don't change dependencies.
  - name: skrizhal-deps
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/skrizhal-deps/cargo
        CARGO_NET_OFFLINE: 'true'
    sources:
      - type: file
        path: ../Cargo.toml
      - type: file
        path: ../Cargo.lock
      - type: file
        path: ../core/Cargo.toml
        dest: core
      - cargo-sources.json
    build-commands:
      # Copy vendor sources to a stable /app/ path so Module 2 uses the same path
      # in cargo fingerprints (fingerprints are path-sensitive for vendor sources).
      - cp -r cargo/vendor /app/skrizhal-cargo-vendor
      - printf '[source.vendored-sources]\ndirectory = "/app/skrizhal-cargo-vendor"\n\n[source.crates-io]\nreplace-with = "vendored-sources"\n' > cargo/config
      # Stub main.rs (root package) and lib.rs (skrizhal-core workspace member)
      # so cargo compiles every dependency but not the real app/core code.
      - mkdir -p src core/src
      - echo 'fn main() {}' > src/main.rs
      - echo '' > core/src/lib.rs
      - cargo --offline build --release --manifest-path Cargo.toml
      # Remove stub artifacts (both workspace members) so Module 2 always
      # recompiles both from real source
      - rm -f /app/skrizhal-cargo-target/release/skrizhal
      - rm -f /app/skrizhal-cargo-target/release/skrizhal.d
      - rm -rf /app/skrizhal-cargo-target/release/.fingerprint/skrizhal-*
      - rm -rf /app/skrizhal-cargo-target/release/.fingerprint/skrizhal_core-*
      - rm -rf /app/skrizhal-cargo-target/release/deps/skrizhal-*
      - rm -rf /app/skrizhal-cargo-target/release/deps/libskrizhal-*
      - rm -rf /app/skrizhal-cargo-target/release/deps/skrizhal_core-*
      - rm -rf /app/skrizhal-cargo-target/release/deps/libskrizhal_core-*

  # Module 2: compile only the skrizhal crate, using pre-built deps from Module 1.
  # Cache key includes all source files, so it always misses on code changes —
  # but cargo only recompiles the skrizhal crate itself (deps are already built).
  - name: skrizhal
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/skrizhal/cargo
        CARGO_NET_OFFLINE: 'true'
    sources:
      - type: dir
        path: ..
      - type: file
        path: io.github.calstfrancis.Skrizhal.metainfo.xml
    build-commands:
      # Point cargo at the vendor dir and pre-built target from skrizhal-deps
      - mkdir -p cargo
      - printf '[source.vendored-sources]\ndirectory = "/app/skrizhal-cargo-vendor"\n\n[source.crates-io]\nreplace-with = "vendored-sources"\n' > cargo/config
      - cargo --offline build --release --manifest-path Cargo.toml
      - install -Dm755 /app/skrizhal-cargo-target/release/skrizhal /app/bin/skrizhal
      - strip /app/bin/skrizhal
      # Clean up build artifacts before finalising the module state
      - rm -rf /app/skrizhal-cargo-vendor /app/skrizhal-cargo-target
      - install -Dm644 packaging/io.github.calstfrancis.Skrizhal.desktop /app/share/applications/io.github.calstfrancis.Skrizhal.desktop
      - install -Dm644 packaging/skrizhal.svg /app/share/icons/hicolor/scalable/apps/io.github.calstfrancis.Skrizhal.svg
      - install -Dm644 io.github.calstfrancis.Skrizhal.metainfo.xml /app/share/metainfo/io.github.calstfrancis.Skrizhal.metainfo.xml
